name: frontend-ci

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_MATCHURI_BACKEND_ORIGIN: ${{ vars.NEXT_PUBLIC_MATCHURI_BACKEND_ORIGIN || 'http://localhost:8080' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build
