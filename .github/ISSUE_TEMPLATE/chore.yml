name: 프론트엔드 운영 작업
description: 기능 개발 외 설정, 의존성, 환경, CI/CD 등의 유지보수 작업을 관리합니다.
title: "[Chore]"
assignees:
  - Leejaelim
type: chore
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 어떤 유지보수 또는 운영 작업이 필요한가요?
      placeholder: 의존성 업데이트, ESLint 설정 정리, 배포 설정 수정
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: 작업 이유
      description: 왜 지금 이 작업이 필요한가요?
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 변경 대상 파일, 환경, 워크플로우를 적어주세요.
      placeholder: Next.js 설정, GitHub Actions, 환경 변수 문서, 패키지 버전
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 완료 기준(AC)
      placeholder: |
        - [ ] 필요한 설정/의존성/워크플로우가 반영됨
        - [ ] 개발 또는 배포 흐름에 문제가 없음
        - [ ] 관련 검증 또는 문서 반영 완료
    validations:
      required: false
