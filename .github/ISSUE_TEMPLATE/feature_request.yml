name: 프론트엔드 기능 요청
description: 실습용 프론트엔드 기능을 제안합니다.
title: "feat(frontend): "
labels:
  - type: feature
  - area: frontend
body:
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 어떤 사용자 동작/화면을 추가하나요?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 완료 기준(AC)
      description: 검증 가능한 기준 2~3개를 작성하세요.
      placeholder: |
        - [ ] 화면이 기대 데이터로 렌더링됨
        - [ ] API 호출 성공/실패 경로 처리됨
        - [ ] lint/test/build 통과
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: 범위 제외
      description: 이번 이슈에서 하지 않을 것을 명시하세요.
      placeholder: 인증 플로우 추가, 디자인 시스템 전면 개편
    validations:
      required: true
